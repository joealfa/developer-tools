<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {{cspMetaTag}}
    <title>Notes</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: var(--vscode-font-family);
            font-size: 12px;
            padding: 8px;
            color: var(--vscode-foreground);
            background-color: var(--vscode-panel-background);
            margin: 0;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
            padding: 8px;
            background-color: var(--vscode-editor-background);
            border-radius: 4px;
        }
        .search-box {
            flex: 1;
            min-width: 150px;
            padding: 4px 8px;
            background-color: var(--vscode-input-background);
            border: 1px solid var(--vscode-input-border);
            color: var(--vscode-input-foreground);
            border-radius: 4px;
            font-size: 12px;
        }
        .search-box:focus {
            outline: none;
            border-color: var(--vscode-focusBorder);
        }
        .filter-select {
            padding: 4px 8px;
            background-color: var(--vscode-dropdown-background);
            border: 1px solid var(--vscode-dropdown-border);
            color: var(--vscode-dropdown-foreground);
            border-radius: 4px;
            font-size: 11px;
        }
        .stats {
            display: flex;
            gap: 12px;
            font-size: 11px;
            color: var(--vscode-descriptionForeground);
            padding: 4px 0;
        }
        .bulk-actions {
            display: flex;
            gap: 8px;
            padding: 8px;
            background-color: var(--vscode-editor-background);
            border-radius: 4px;
            margin-bottom: 8px;
            align-items: center;
        }
        .bulk-actions.hidden {
            display: none;
        }
        .btn {
            padding: 4px 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        .btn-danger {
            background-color: var(--vscode-inputValidation-errorBackground);
            color: var(--vscode-inputValidation-errorForeground);
        }
        .btn-secondary {
            background-color: var(--vscode-button-secondaryBackground);
            color: var(--vscode-button-secondaryForeground);
        }
        .notes-container {
            padding: 4px;
        }
        .note-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border-bottom: 1px solid var(--vscode-widget-border);
            cursor: pointer;
            font-size: 11px;
        }
        .note-row:hover {
            background-color: var(--vscode-list-hoverBackground);
        }
        .note-checkbox-col {
            flex-shrink: 0;
        }
        .note-status-col {
            flex-shrink: 0;
        }
        .note-content-col {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .note-first-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .note-second-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            color: var(--vscode-descriptionForeground);
        }
        .note-actions-col {
            flex-shrink: 0;
        }
        .group-header {
            background-color: var(--vscode-editor-background);
            font-weight: 600;
            padding: 8px;
            border-bottom: 1px solid var(--vscode-widget-border);
        }
        .group-toggle {
            cursor: pointer;
            user-select: none;
        }
        .category-badge {
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        .category-badge svg {
            width: 11px;
            height: 11px;
        }
        .status-icon {
            font-size: 12px;
            display: inline-flex;
            align-items: center;
        }
        .status-icon svg {
            width: 12px;
            height: 12px;
        }
        .note-file {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .note-line {
            flex-shrink: 0;
        }
        .note-date {
            flex-shrink: 0;
        }
        .note-preview-row {
            font-size: 11px;
            color: var(--vscode-foreground);
            opacity: 0.75;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .action-btn {
            background: transparent;
            border: none;
            color: var(--vscode-foreground);
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 2px;
            opacity: 0.7;
            font-size: 11px;
        }
        .action-btn:hover {
            opacity: 1;
            background-color: var(--vscode-toolbar-hoverBackground);
        }
        .action-btn.danger:hover {
            background-color: var(--vscode-inputValidation-errorBackground);
        }
        .empty-state {
            text-align: center;
            padding: 24px;
            color: var(--vscode-descriptionForeground);
        }
        input[type="checkbox"] {
            width: 14px;
            height: 14px;
        }
        .action-btn svg {
            width: 14px;
            height: 14px;
            vertical-align: middle;
        }
        .empty-state-icon svg {
            width: 32px;
            height: 32px;
        }
        /* Custom dropdown styles */
        .custom-dropdown {
            position: relative;
        }
        .custom-dropdown-trigger {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            background-color: var(--vscode-dropdown-background);
            border: 1px solid var(--vscode-dropdown-border);
            color: var(--vscode-dropdown-foreground);
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            white-space: nowrap;
        }
        .custom-dropdown-trigger:hover {
            background-color: var(--vscode-list-hoverBackground);
        }
        .custom-dropdown-trigger svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }
        .custom-dropdown-trigger .arrow {
            margin-left: 4px;
            font-size: 8px;
        }
        .custom-dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            min-width: 100%;
            background-color: var(--vscode-dropdown-background);
            border: 1px solid var(--vscode-dropdown-border);
            border-radius: 4px;
            margin-top: 2px;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        .custom-dropdown.open .custom-dropdown-menu {
            display: block;
        }
        .custom-dropdown-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 8px;
            cursor: pointer;
            font-size: 11px;
            white-space: nowrap;
        }
        .custom-dropdown-item:hover {
            background-color: var(--vscode-list-hoverBackground);
        }
        .custom-dropdown-item.selected {
            background-color: var(--vscode-list-activeSelectionBackground);
            color: var(--vscode-list-activeSelectionForeground);
        }
        .custom-dropdown-item svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <input type="text" class="search-box" id="searchBox" placeholder="Search notes...">
        <div class="custom-dropdown" id="categoryFilterDropdown">
            <div class="custom-dropdown-trigger" data-dropdown-target="categoryFilterDropdown">
                <span>All Categories</span><span class="arrow">▼</span>
            </div>
            <div class="custom-dropdown-menu"></div>
        </div>
        <div class="custom-dropdown" id="statusFilterDropdown">
            <div class="custom-dropdown-trigger" data-dropdown-target="statusFilterDropdown">
                <span>All Status</span><span class="arrow">▼</span>
            </div>
            <div class="custom-dropdown-menu"></div>
        </div>
        <select class="filter-select" id="groupBySelect">
            <option value="file" selected>File</option>
            <option value="category">Category</option>
            <option value="status">Status</option>
            <option value="none">None</option>
        </select>
    </div>

    <div class="stats">
        <span id="statsCount">Showing 0 notes</span>
    </div>

    <div class="bulk-actions hidden" id="bulkActions">
        <input type="checkbox" id="selectAllCheckbox" title="Select all">
        <span id="selectedCount">0 selected</span>
        <div class="custom-dropdown" id="bulkCategoryDropdown">
            <div class="custom-dropdown-trigger" data-dropdown-target="bulkCategoryDropdown">
                <span>Change Category...</span><span class="arrow">▼</span>
            </div>
            <div class="custom-dropdown-menu"></div>
        </div>
        <button class="btn btn-danger" id="deleteSelectedBtn">Delete Selected</button>
    </div>

    <div id="tableContainer"></div>

    <script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>
</html>
