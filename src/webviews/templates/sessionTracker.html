<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {{cspMetaTag}}
    <title>Session Tracker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--vscode-font-family);
            padding: 12px;
            color: var(--vscode-foreground);
            background-color: var(--vscode-sideBar-background);
            font-size: 12px;
        }
        .status-bar {
            background: var(--vscode-input-background);
            border: 1px solid var(--vscode-input-border);
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 12px;
            text-align: center;
        }
        .status-text {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .status-text.active { color: var(--vscode-foreground); }
        .status-text.inactive { color: var(--vscode-descriptionForeground); }
        .btn-group {
            display: flex;
            gap: 6px;
            justify-content: center;
        }
        .btn {
            padding: 4px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        .btn-primary {
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
        }
        .btn-primary:hover { background: var(--vscode-button-hoverBackground); }
        .btn-secondary {
            background: var(--vscode-button-secondaryBackground);
            color: var(--vscode-button-secondaryForeground);
        }
        .btn-secondary:hover { background: var(--vscode-button-secondaryHoverBackground); }
        .btn-danger {
            background: var(--vscode-button-secondaryBackground);
            color: var(--vscode-button-secondaryForeground);
            border: none;
        }
        .section {
            background: var(--vscode-input-background);
            border: 1px solid var(--vscode-input-border);
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 12px;
        }
        .section-title {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .file-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }
        .file-table th {
            text-align: left;
            padding: 4px;
            border-bottom: 1px solid var(--vscode-input-border);
            color: var(--vscode-descriptionForeground);
        }
        .file-table td {
            padding: 4px;
            border-bottom: 1px solid var(--vscode-input-border);
        }
        .file-table td:first-child {
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            justify-content: center;
        }
        .empty-state {
            text-align: center;
            padding: 16px;
            color: var(--vscode-descriptionForeground);
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid var(--vscode-input-border);
        }
        .history-item:last-child { border-bottom: none; }
        .history-meta { font-size: 11px; color: var(--vscode-descriptionForeground); }
        .history-actions { display: flex; gap: 4px; }
        .history-actions button {
            background: transparent;
            border: none;
            color: var(--vscode-textLink-foreground);
            cursor: pointer;
            font-size: 10px;
            padding: 2px 4px;
        }
        .history-actions button:hover { text-decoration: underline; }
        .history-actions button.delete-btn { color: var(--vscode-textLink-foreground); }
        .badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: bold;
        }
        .badge-completed {
            background: var(--vscode-badge-background);
            color: var(--vscode-badge-foreground);
        }
        .badge-recovered {
            background: var(--vscode-badge-background);
            color: var(--vscode-badge-foreground);
        }
        .back-btn {
            cursor: pointer;
            color: var(--vscode-textLink-foreground);
            font-size: 11px;
            margin-bottom: 8px;
            display: none;
        }
        .back-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="status-bar">
        <div class="status-text inactive" id="statusText">Session Inactive</div>
        <div class="btn-group">
            <button class="btn btn-primary" id="startBtn">Start</button>
            <button class="btn btn-secondary" id="stopBtn" style="display:none">Stop</button>
            <button class="btn btn-secondary" id="resetBtn" style="display:none">Reset</button>
        </div>
    </div>

    <div class="back-btn" id="backBtn">← Back to Current Session</div>

    <div class="section" id="filesSection" style="display:none">
        <div class="section-title">Files Touched</div>
        <table class="file-table">
            <thead>
                <tr><th>File</th><th>Edits</th><th>+</th><th>-</th><th>Time</th></tr>
            </thead>
            <tbody id="filesBody"></tbody>
        </table>
        <div class="actions">
            <button class="btn btn-secondary" id="copySummaryBtn">Copy Summary</button>
            <button class="btn btn-secondary" id="exportJsonBtn">Export JSON</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title" id="historyToggle">
            Session History <span id="historyArrow">▶</span>
        </div>
        <div id="historyContent" style="display:none">
            <div id="historyList"><div class="empty-state">Click to load history</div></div>
            <div class="actions" style="margin-top:8px">
                <button class="btn btn-danger" id="clearHistoryBtn" style="display:none">Clear All History</button>
            </div>
        </div>
    </div>

    <script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>
</html>
