<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	{{cspMetaTag}}
	<title>Password Generator</title>
	<style>
		* {
			box-sizing: border-box;
		}
		body {
			font-family: var(--vscode-font-family);
			padding: 12px;
			color: var(--vscode-foreground);
			background-color: var(--vscode-sideBar-background);
		}
		.password-display {
			background-color: var(--vscode-input-background);
			border: 1px solid var(--vscode-input-border);
			border-radius: 4px;
			padding: 12px;
			margin-bottom: 16px;
			display: flex;
			flex-direction: column;
			gap: 8px;
		}
		.password-text {
			font-family: monospace;
			font-size: 14px;
			word-break: break-all;
			line-height: 1.4;
		}
		.password-text .number {
			color: var(--vscode-debugTokenExpression-number);
		}
		.password-text .special {
			color: var(--vscode-debugTokenExpression-error);
		}
		.icon-buttons {
			display: flex;
			gap: 6px;
			margin-top: 4px;
		}
		.icon-btn {
			background: transparent;
			border: none;
			color: var(--vscode-foreground);
			cursor: pointer;
			padding: 6px;
			border-radius: 4px;
			display: flex;
			align-items: center;
			justify-content: center;
			flex: 1;
		}
		.icon-btn:hover {
			background-color: var(--vscode-toolbar-hoverBackground);
		}
		.icon-btn svg {
			width: 16px;
			height: 16px;
			margin-right: 4px;
		}
		.icon-btn-text {
			font-size: 11px;
		}
		.section {
			background-color: var(--vscode-input-background);
			border: 1px solid var(--vscode-input-border);
			border-radius: 4px;
			padding: 12px;
			margin-bottom: 12px;
		}
		.section-title {
			font-weight: bold;
			margin-bottom: 10px;
			font-size: 12px;
		}
		.form-group {
			margin-bottom: 10px;
		}
		.form-group label {
			display: block;
			margin-bottom: 4px;
			font-size: 11px;
			color: var(--vscode-descriptionForeground);
		}
		input[type="number"] {
			width: 100%;
			padding: 6px;
			background-color: var(--vscode-input-background);
			border: 1px solid var(--vscode-input-border);
			color: var(--vscode-input-foreground);
			border-radius: 4px;
			font-size: 12px;
		}
		.hint {
			font-size: 10px;
			color: var(--vscode-descriptionForeground);
			margin-top: 4px;
			line-height: 1.3;
		}
		.checkbox-group {
			display: flex;
			flex-direction: column;
			gap: 8px;
			margin-bottom: 12px;
		}
		.checkbox-item {
			display: flex;
			align-items: center;
			gap: 6px;
		}
		.checkbox-item input[type="checkbox"] {
			width: 14px;
			height: 14px;
			accent-color: var(--vscode-checkbox-background);
		}
		.checkbox-item span {
			font-size: 12px;
		}
		.number-inputs {
			display: flex;
			gap: 8px;
		}
		.number-inputs .form-group {
			flex: 1;
		}
	</style>
</head>
<body>
	<div class="password-display">
		<span class="password-text" id="passwordDisplay">{{initialPassword}}</span>
		<div class="icon-buttons">
			<button class="icon-btn" id="regenerateBtn" title="Regenerate">
				{{iconRotateCcwKey}}
				<span class="icon-btn-text">New</span>
			</button>
			<button class="icon-btn" id="copyBtn" title="Copy to clipboard">
				{{iconClipboardCopy}}
				<span class="icon-btn-text">Copy</span>
			</button>
			<button class="icon-btn" id="insertBtn" title="Insert to document">
				{{iconInsertIntoDocument}}
				<span class="icon-btn-text">Insert</span>
			</button>
		</div>
	</div>

	<div class="section">
		<div class="section-title">Options</div>
		<div class="form-group">
			<label for="length">Length</label>
			<input type="number" id="length" value="14" min="5" max="128">
			<div class="hint">Between 5 and 128. Use 14+ for strong passwords.</div>
		</div>
	</div>

	<div class="section">
		<div class="section-title">Include</div>
		<div class="checkbox-group">
			<label class="checkbox-item">
				<input type="checkbox" id="includeUppercase" checked>
				<span>Uppercase (A-Z)</span>
			</label>
			<label class="checkbox-item">
				<input type="checkbox" id="includeLowercase" checked>
				<span>Lowercase (a-z)</span>
			</label>
			<label class="checkbox-item">
				<input type="checkbox" id="includeNumbers" checked>
				<span>Numbers (0-9)</span>
			</label>
			<label class="checkbox-item">
				<input type="checkbox" id="includeSpecial" checked>
				<span>Special (!@#$%^&*)</span>
			</label>
		</div>
		<div class="number-inputs">
			<div class="form-group">
				<label for="minNumbers">Min numbers</label>
				<input type="number" id="minNumbers" value="2" min="0" max="10">
			</div>
			<div class="form-group">
				<label for="minSpecial">Min special</label>
				<input type="number" id="minSpecial" value="2" min="0" max="10">
			</div>
		</div>
		<label class="checkbox-item">
			<input type="checkbox" id="avoidAmbiguous">
			<span>Avoid ambiguous chars</span>
		</label>
	</div>

	<script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>
</html>
